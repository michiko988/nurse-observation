<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="夜間様子記録">
<title>恵比寿M様 夜間様子記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #F0F0EC; color: #2A2A2A; }
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; border-bottom: 1px solid #E0DDD8; display: flex; height: 52px; }
.nav-btn { flex: 1; height: 52px; border: none; background: none; font-size: 13px; font-weight: 600; color: #888; border-bottom: 3px solid transparent; font-family: inherit; cursor: pointer; }
.nav-btn.on { color: #C0392B; border-bottom-color: #C0392B; }
.pg { display: none; padding: 68px 14px 60px; }
.pg.on { display: block; }
.card { background: #fff; border-radius: 12px; border: 1px solid #E0DDD8; margin-bottom: 12px; overflow: hidden; }
.ch { padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #E0DDD8; }
.cb { padding: 13px 14px; }
.sec { margin-bottom: 12px; }
.sec:last-child { margin-bottom: 0; }
.stl { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.06em; margin-bottom: 6px; }
.lr { display: flex; gap: 6px; }
.lb { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1.5px solid #E0DDD8; background: #fafaf8; text-align: center; cursor: pointer; font-family: inherit; }
.lb .em { font-size: 18px; }
.lb .lbl { font-size: 11px; color: #888; margin-top: 2px; }
.lb.s0 { border-color: #5A8A68; background: #5A8A6812; }
.lb.s0 .lbl { color: #5A8A68; font-weight: 700; }
.lb.s1 { border-color: #E8A838; background: #E8A83812; }
.lb.s1 .lbl { color: #E8A838; font-weight: 700; }
.lb.s2 { border-color: #E07030; background: #E0703012; }
.lb.s2 .lbl { color: #E07030; font-weight: 700; }
.lb.s3 { border-color: #C0392B; background: #C0392B12; }
.lb.s3 .lbl { color: #C0392B; font-weight: 700; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { padding: 5px 10px; border-radius: 20px; border: 1.5px solid #E0DDD8; background: #fafaf8; font-size: 11px; color: #888; cursor: pointer; font-family: inherit; }
.chip.or { border-color: #C0392B; background: #C0392B12; color: #C0392B; font-weight: 700; }
.chip.og { border-color: #5A8A68; background: #5A8A6812; color: #5A8A68; font-weight: 700; }
.chip.oa { border-color: #E8A838; background: #E8A83812; color: #E8A838; font-weight: 700; }
.chip.ob { border-color: #3A5F8A; background: #3A5F8A12; color: #3A5F8A; font-weight: 700; }
textarea { width: 100%; border-radius: 8px; border: 1.5px solid #E0DDD8; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; outline: none; background: #fafaf8; color: #2A2A2A; line-height: 1.5; }
input { width: 100%; border-radius: 8px; border: 1.5px solid #E0DDD8; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; background: #fafaf8; color: #2A2A2A; -webkit-appearance: none; }
.fr { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.fl { font-size: 10px; color: #888; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.05em; }
.ph { background: #fff; border-radius: 12px; padding: 13px 14px; margin-bottom: 12px; border: 1px solid #E0DDD8; }
.ph .br { font-size: 10px; color: #C0392B; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 2px; }
.ph .tt { font-size: 19px; font-weight: 800; }
.sv-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #C0392B; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
.sv-btn.ok { background: #5A8A68; }
.rec { background: #fff; border-radius: 12px; border: 1px solid #E0DDD8; padding: 13px 14px; margin-bottom: 10px; cursor: pointer; }
.rd { font-size: 14px; font-weight: 700; }
.rn { font-size: 12px; color: #888; margin-top: 2px; }
.rb { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #C0392B18; color: #C0392B; }
.dl { float: right; background: none; border: 1px solid #ddd; border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #888; cursor: pointer; font-family: inherit; }
.sg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.sc { background: #fff; border-radius: 10px; border: 1px solid #E0DDD8; padding: 10px 12px; }
.sc .sl { font-size: 10px; color: #888; margin-bottom: 3px; }
.sc .sv { font-size: 13px; font-weight: 700; }
.empty { text-align: center; color: #888; font-size: 13px; padding: 40px 20px; }
.dv { height: 1px; background: #E0DDD8; margin: 6px 0; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<nav class="nav">
  <button class="nav-btn on" id="tab-r" onclick="go('r')">✏️ 記録</button>
  <button class="nav-btn" id="tab-h" onclick="go('h')">📋 履歴</button>
  <button class="nav-btn" id="tab-i" onclick="go('i')">📊 分析</button>
</nav>
<div class="pg on" id="pg-r">
  <div class="ph"><div class="br">恵比寿M様</div><div class="tt">夜間様子記録</div></div>
  <div class="fr">
    <div><div class="fl">記録日</div><input type="date" id="rec-date"></div>
    <div><div class="fl">担当ナース</div><input type="text" id="rec-nurse" placeholder="お名前"></div>
  </div>
  <div id="sum-area" class="sg" style="display:none">
    <div class="sc"><div class="sl">不穏ピーク帯</div><div class="sv" id="s-pk">—</div></div>
    <div class="sc"><div class="sl">最高血圧帯</div><div class="sv" id="s-bp" style="color:#C0392B">—</div></div>
    <div class="sc"><div class="sl">不穏のきっかけ</div><div class="sv" id="s-tr" style="color:#E8A838;font-size:11px">—</div></div>
    <div class="sc"><div class="sl">落ち着いたきっかけ</div><div class="sv" id="s-ca" style="color:#5A8A68;font-size:11px">—</div></div>
  </div>
  <div id="blocks"></div>
  <button class="sv-btn" id="sv-btn" onclick="saveRec()">この記録を保存する</button>
</div>
<div class="pg" id="pg-h">
  <div class="ph"><div class="br">恵比寿M様</div><div class="tt">記録履歴</div></div>
  <div id="hist"></div>
</div>
<div class="pg" id="pg-i">
  <div class="ph"><div class="br">恵比寿M様</div><div class="tt">パターン分析</div></div>
  <div id="ins"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var SL=[
  {id:'t1',time:'16:00〜17:00',tag:'帰宅直後',c:'#5A8A68',ck:'og'},
  {id:'t2',time:'17:00〜18:00',tag:'夕食・内服',c:'#5A8A68',ck:'og'},
  {id:'t3',time:'18:00〜18:50',tag:'⚡予防介入タイム',c:'#E8A838',ck:'oa'},
  {id:'t4',time:'18:50〜20:00',tag:'🔴不穏ピーク帯',c:'#C0392B',ck:'or'},
  {id:'t5',time:'20:00〜24:00',tag:'深夜見守り',c:'#3A5F8A',ck:'ob'},
  {id:'t6',time:'0:00〜5:00',tag:'夜間',c:'#3A5F8A',ck:'ob'},
  {id:'t7',time:'5:00〜7:00',tag:'🟢朝のケア',c:'#5A8A68',ck:'og'}
];
var LV=[{v:0,e:'😊',l:'なし'},{v:1,e:'😐',l:'軽度'},{v:2,e:'😟',l:'中程度'},{v:3,e:'😰',l:'強い'}];
var BP=['測定せず','〜140','141〜160','161〜180','181〜200','200〜'];
var BH=['室内を歩き回る','ソファに座る','テレビをつける','ベッド誘導拒否','トイレ誘導拒否','マッサージ拒否','声かけに反応あり','声かけ無反応','入眠'];
var TR=['暗くなった','スタッフが慌ただしかった','誘導・制止された','空腹だった','排泄の不快感','体位変換後','特に思い当たらない'];
var CA=['ソファに座った','飲み物を飲んだ','並んで歩いた','声かけで落ち着いた','足底マッサージ','自然に入眠','その他'];
var ST={};
function initST(){ST={};SL.forEach(function(s){ST[s.id]={ag:null,bp:null,bh:[],tr:[],ca:[],memo:''};});}
function buildBlocks(){
  var c=document.getElementById('blocks');c.innerHTML='';
  SL.forEach(function(s){
    var d=ST[s.id];
    var lv=LV.map(function(lv){return '<button class="lb'+(d.ag===lv.v?' s'+lv.v:'')+'" onclick="setAg(\''+s.id+'\','+lv.v+')"><div class="em">'+lv.e+'</div><div class="lbl">'+lv.l+'</div></button>';}).join('');
    var bp=BP.map(function(b){return '<button class="chip'+(d.bp===b?' or':'')+'" onclick="setBP(\''+s.id+'\',\''+b+'\')">'+b+'</button>';}).join('');
    var bh=BH.map(function(b){return '<button class="chip'+(d.bh.indexOf(b)>=0?' '+s.ck:'')+'" onclick="tog(\''+s.id+'\',\'bh\',\''+b+'\')">'+b+'</button>';}).join('');
    var tr=s.id==='t4'?'<div class="sec"><div class="stl">不穏のきっかけ</div><div class="chips">'+TR.map(function(t){return '<button class="chip'+(d.tr.indexOf(t)>=0?' oa':'')+'" onclick="tog(\''+s.id+'\',\'tr\',\''+t+'\')">'+t+'</button>';}).join('')+'</div></div>':'';
    var ca=CA.map(function(c2){return '<button class="chip'+(d.ca.indexOf(c2)>=0?' og':'')+'" onclick="tog(\''+s.id+'\',\'ca\',\''+c2+'\')">'+c2+'</button>';}).join('');
    var el=document.createElement('div');el.className='card';
    el.innerHTML='<div class="ch" style="background:'+s.c+'12;border-bottom:1px solid '+s.c+'30"><span style="font-size:14px;font-weight:800">'+s.time+'</span><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+s.c+'20;color:'+s.c+'">'+s.tag+'</span></div><div class="cb"><div class="sec"><div class="stl">不穏レベル</div><div class="lr">'+lv+'</div></div><div class="sec"><div class="stl">血圧</div><div class="chips">'+bp+'</div></div><div class="sec"><div class="stl">観察された行動</div><div class="chips">'+bh+'</div></div>'+tr+'<div class="sec"><div class="stl">落ち着いたきっかけ</div><div class="chips">'+ca+'</div></div><div class="sec"><div class="stl">メモ・気づき</div><textarea rows="2" placeholder="声かけの内容、本人の言葉など..." onchange="ST[\''+s.id+'\'].memo=this.value">'+d.memo+'</textarea></div></div>';
    c.appendChild(el);
  });
  updateSum();
}
function setAg(sid,v){ST[sid].ag=ST[sid].ag===v?null:v;buildBlocks();}
function setBP(sid,v){ST[sid].bp=ST[sid].bp===v?null:v;buildBlocks();}
function tog(sid,f,v){var a=ST[sid][f];var i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);buildBlocks();}
function updateSum(){
  var maxA=-1,pk=null;
  SL.forEach(function(s){var a=ST[s.id].ag;if(a!==null&&a>maxA){maxA=a;pk=s;}});
  var bpO={'200〜':6,'181〜200':5,'161〜180':4,'141〜160':3,'〜140':2,'測定せず':1};
  var maxB=0,maxBV=null;
  SL.forEach(function(s){var b=ST[s.id].bp;if(b&&bpO[b]>maxB){maxB=bpO[b];maxBV=b;}});
  var allTr=[],allCa=[];
  Object.values(ST).forEach(function(r){(r.tr||[]).forEach(function(t){allTr.push(t);});(r.ca||[]).forEach(function(c){allCa.push(c);});});
  var has=maxA>=0||maxBV||allTr.length||allCa.length;
  document.getElementById('sum-area').style.display=has?'grid':'none';
  document.getElementById('s-pk').textContent=pk?pk.time:'—';
  document.getElementById('s-bp').textContent=maxBV||'—';
  document.getElementById('s-tr').textContent=allTr.length?allTr.slice(0,2).join('・'):'—';
  document.getElementById('s-ca').textContent=allCa.length?allCa.slice(0,2).join('・'):'—';
}
function saveRec(){
  var date=document.getElementById('rec-date').value;
  var nurse=document.getElementById('rec-nurse').value.trim();
  if(!date){toast('記録日を入力してください');return;}
  var recs=getRecs();var id=Date.now().toString();
  recs[id]={id:id,date:date,nurse:nurse,slots:JSON.parse(JSON.stringify(ST)),savedAt:new Date().toISOString()};
  localStorage.setItem('ebisu-m',JSON.stringify(recs));
  var btn=document.getElementById('sv-btn');
  btn.textContent='✓ 保存しました';btn.classList.add('ok');toast('記録を保存しました！');
  setTimeout(function(){btn.textContent='この記録を保存する';btn.classList.remove('ok');},2000);
  initST();buildBlocks();
  document.getElementById('rec-date').value=today();
  document.getElementById('rec-nurse').value=nurse;
}
function getRecs(){try{return JSON.parse(localStorage.getItem('ebisu-m')||'{}')}catch(e){return{}}}
function renderHist(){
  var recs=Object.values(getRecs()).sort(function(a,b){return b.date.localeCompare(a.date);});
  var el=document.getElementById('hist');
  if(!recs.length){el.innerHTML='<div class="empty">まだ記録がありません</div>';return;}
  el.innerHTML=recs.map(function(r){
    var maxA=-1,pk=null;
    SL.forEach(function(s){var a=r.slots&&r.slots[s.id]?r.slots[s.id].ag:null;if(a!=null&&a>maxA){maxA=a;pk=s;}});
    var em=['😊','😐','😟','😰'][maxA]||'';
    return '<div class="rec" onclick="loadRec(\''+r.id+'\')"><div style="display:flex;justify-content:space-between;align-items:center"><span class="rd">'+fmtDate(r.date)+'</span><button class="dl" onclick="delRec(event,\''+r.id+'\')">削除</button></div><div class="rn">'+(r.nurse||'担当者不明')+'</div>'+(pk?'<div class="rb">'+em+' ピーク: '+pk.time+'</div>':'')+'</div>';
  }).join('');
}
function loadRec(id){var r=getRecs()[id];if(!r)return;ST=JSON.parse(JSON.stringify(r.slots));document.getElementById('rec-date').value=r.date;document.getElementById('rec-nurse').value=r.nurse||'';buildBlocks();go('r');toast('記録を読み込みました');}
function delRec(e,id){e.stopPropagation();if(!confirm('この記録を削除しますか？'))return;var recs=getRecs();delete recs[id];localStorage.setItem('ebisu-m',JSON.stringify(recs));renderHist();toast('削除しました');}
function renderIns(){
  var recs=Object.values(getRecs());var el=document.getElementById('ins');
  if(recs.length<2){el.innerHTML='<div class="empty">2件以上の記録が溜まると<br>パターン分析が表示されます</div>';return;}
  var slA={};SL.forEach(function(s){slA[s.id]=[];});
  recs.forEach(function(r){SL.forEach(function(s){var a=r.slots&&r.slots[s.id]?r.slots[s.id].ag:null;if(a!=null)slA[s.id].push(a);});});
  var sorted=SL.map(function(s){var arr=slA[s.id];return{s:s,avg:arr.length?arr.reduce(function(a,b){return a+b;},0)/arr.length:0,n:arr.length};}).sort(function(a,b){return b.avg-a.avg;});
  var trC={},caC={};
  recs.forEach(function(r){Object.values(r.slots).forEach(function(s){(s.tr||[]).forEach(function(t){trC[t]=(trC[t]||0)+1;});(s.ca||[]).forEach(function(c){caC[c]=(caC[c]||0)+1;});});});
  var topTr=Object.entries(trC).sort(function(a,b){return b[1]-a[1];}).slice(0,4);
  var topCa=Object.entries(caC).sort(function(a,b){return b[1]-a[1];}).slice(0,4);
  el.innerHTML='<div class="card"><div class="ch" style="background:#C0392B10"><span style="font-weight:800;font-size:14px">🔴 不穏が多い時間帯 TOP3</span></div><div class="cb">'+sorted.slice(0,3).map(function(it,i){return'<div style="display:flex;align-items:center;gap:10px;padding:4px 0"><span style="font-size:13px;font-weight:700;color:#888;width:20px">'+(i+1)+'</span><div style="flex:1"><div style="font-size:13px;font-weight:700">'+it.s.time+'</div><div style="font-size:11px;color:#888">'+it.n+'件の記録</div></div></div>'+(i<2?'<div class="dv"></div>':'');}).join('')+'</div></div><div class="card"><div class="ch" style="background:#E8A83810"><span style="font-weight:800;font-size:14px">⚡ 不穏のきっかけ</span></div><div class="cb">'+(topTr.length?topTr.map(function(x,i){return'<div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:13px">'+x[0]+'</span><span style="font-size:12px;font-weight:700;color:#E8A838">'+x[1]+'回</span></div>'+(i<topTr.length-1?'<div class="dv"></div>':'');}).join(''):'<div style="color:#888;font-size:13px">データが少ないです</div>')+'</div></div><div class="card"><div class="ch" style="background:#5A8A6810"><span style="font-weight:800;font-size:14px">🟢 効果的だった対応</span></div><div class="cb">'+(topCa.length?topCa.map(function(x,i){return'<div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:13px">'+x[0]+'</span><span style="font-size:12px;font-weight:700;color:#5A8A68">'+x[1]+'回</span></div>'+(i<topCa.length-1?'<div class="dv"></div>':'');}).join(''):'<div style="color:#888;font-size:13px">データが少ないです</div>')+'</div></div><div style="text-align:center;font-size:11px;color:#aaa;padding:8px">'+recs.length+'件の記録を分析中</div>';
}
function go(tab){
  ['r','h','i'].forEach(function(t){document.getElementById('pg-'+t).classList.toggle('on',t===tab);document.getElementById('tab-'+t).classList.toggle('on',t===tab);});
  if(tab==='h')renderHist();if(tab==='i')renderIns();
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';var d=new Date(s+'T00:00:00');var days=['日','月','火','水','木','金','土'];return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';}
initST();document.getElementById('rec-date').value=today();buildBlocks();
</script>
</body>
</html>
